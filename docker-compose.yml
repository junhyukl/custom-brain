# Family Brain 로컬 실행 (앱 + Qdrant). Ollama는 호스트에서 실행 후 OLLAMA_BASE_URL 등 설정.
services:
  brain:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./public:/app/public
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage: {}
